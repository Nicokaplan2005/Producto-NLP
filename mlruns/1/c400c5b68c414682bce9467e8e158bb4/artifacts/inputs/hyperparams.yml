xgboost:
  objective: "binary:logistic"
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 5
  min_child_weight: 3
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  scale_pos_weight: 1.0
  tree_method: "hist"
  eval_metric:
    - "logloss"
    - "aucpr"
  early_stopping_rounds: 50

runtime:
  random_state: 42
  validation_size: 0.10
